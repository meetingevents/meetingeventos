<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Test de conexión — Meeting Eventos</title>
<style>
  body{font-family:Arial,sans-serif;max-width:600px;margin:40px auto;padding:20px;}
  input{width:100%;padding:10px;margin:10px 0;border:1px solid #ccc;border-radius:6px;}
  button{padding:12px 20px;background:#004aad;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:bold;}
  button:hover{background:#003580;}
  #resultado{margin-top:20px;padding:15px;border-radius:8px;white-space:pre-wrap;font-family:monospace;font-size:13px;}
  .ok{background:#f0fdf4;border:1px solid #86efac;color:#00875a;}
  .error{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;}
</style>
</head>
<body>
  <h2>🔌 Test de conexión directa al Apps Script</h2>
  <p>Pega la URL del Apps Script y pulsa "Probar". Esta página NO tiene nada más que esta prueba.</p>
  <input type="text" id="url" placeholder="https://script.google.com/macros/s/.../exec">
  <button onclick="probar()">Probar conexión</button>
  <div id="resultado"></div>

<script>
async function probar(){
  const url = document.getElementById('url').value.trim();
  const res = document.getElementById('resultado');
  res.className = '';
  res.textContent = 'Conectando...';

  if(!url){ res.className='error'; res.textContent='⚠️ Pega una URL primero.'; return; }

  try {
    const t0 = Date.now();
    const resp = await fetch(`${url}?action=ping`);
    const t1 = Date.now();
    const text = await resp.text();
    let json;
    try { json = JSON.parse(text); } catch(e) { json = null; }

    let out = `HTTP Status: ${resp.status}\nTiempo: ${t1-t0}ms\n\n`;
    out += `Respuesta cruda:\n${text}\n`;

    if(json && json.success){
      res.className = 'ok';
      out = `✅ CONEXIÓN OK\n\n` + out;
    } else {
      res.className = 'error';
      out = `⚠️ Respuesta inesperada (no es JSON válido o success=false)\n\n` + out;
    }
    res.textContent = out;
  } catch(err) {
    res.className = 'error';
    res.textContent = `❌ FALLO DE RED\n\nMensaje: ${err.message}\n\nEsto significa que el navegador NI SIQUIERA pudo contactar con esa URL.\nCausas típicas:\n- La URL está mal copiada (revisa que no falte ningún carácter)\n- La implementación fue eliminada o no está activa\n- "Quién tiene acceso" no está puesto en "Cualquiera"`;
  }
}
</script>
</body>
</html>
